version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - /tmp:/tmp
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - datadoctor-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8000
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - datadoctor-network

networks:
  datadoctor-network:
    driver: bridge
